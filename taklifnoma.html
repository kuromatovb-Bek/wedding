<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тўй таклифномаси</title>
    <style>
        body {
            background: #fffafa;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Times New Roman', serif;
            text-align: center;
        }
        .container {
            width: 85%;
            max-width: 350px;
            background: white;
            padding: 40px 20px;
            border-radius: 15px;
            border: 6px double #d4af37;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .ornament { font-size: 40px; color: #d4af37; margin-bottom: 15px; }
        h1 { font-size: 28px; color: #333; letter-spacing: 3px; margin: 10px 0; }
        .family-name { font-size: 24px; color: #d4af37; font-weight: bold; margin: 20px 0; }
        p { font-size: 18px; color: #555; line-height: 1.6; margin: 10px 0; }
        .date-box { 
            border-top: 1px solid #d4af37; 
            border-bottom: 1px solid #d4af37; 
            padding: 10px 0; 
            margin: 25px 0; 
            font-weight: bold; 
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ornament">🕊️</div>
        <h1>ТАКЛИФНОМА</h1>
        <p>Ассалому алайкум!</p>
        <p>Сизни азиз инсонимизнинг никоҳ тўйи муносабати билан ёзиладиган дастурхонимизга таклиф этамиз.</p>
        
        <div class="family-name">Sharipovlar оиласи</div>
        
        <div class="date-box">
            2026 ЙИЛ<br>
            СИЗ КУТГАН ЎША КУН
        </div>

        <p>Ташрифингиздан мамнун бўламиз!</p>
        <div class="ornament">✨</div>
    </div>
</body>
</html>
